<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48" fill="none">
  <title>Substream</title>
  <!-- Mark -->
  <g transform="translate(4,4)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="url(#g)"/>
    <path d="M10 20 h10 l-3 6 h10 l-3 6" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="30" cy="14" r="3" fill="#fff"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(56,0)" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial" font-weight="700" font-size="24">
    <text x="0" y="32" fill="#ffffff">sub</text>
    <text x="40" y="32" fill="url(#g)">stream</text>
  </g>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
</svg>
