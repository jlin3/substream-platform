<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d14"/>
      <stop offset="1" stop-color="#111425"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Mark -->
  <g transform="translate(96,96)">
    <rect x="0" y="0" width="96" height="96" rx="22" fill="url(#g)"/>
    <path d="M24 50 h24 l-7 14 h24 l-7 14" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="72" cy="30" r="7" fill="#fff"/>
  </g>
  <!-- Wordmark -->
  <g font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial" font-weight="800">
    <text x="220" y="170" font-size="72" fill="#ffffff">sub</text>
    <text x="336" y="170" font-size="72" fill="url(#g)">stream</text>
  </g>
  <!-- Hero copy -->
  <g font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial" fill="#ffffff">
    <text x="96" y="330" font-size="72" font-weight="800">Live streaming + AI highlights.</text>
    <text x="96" y="412" font-size="48" font-weight="400" fill="#a5b4ff">Canvas capture, WebRTC, cloud recording,</text>
    <text x="96" y="468" font-size="48" font-weight="400" fill="#a5b4ff">and Gemini-powered highlight reels.</text>
  </g>
  <!-- Footer -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#22d3ee" font-size="28">
    <text x="96" y="570">import { SubstreamPublisher } from '@substream/web-sdk';</text>
  </g>
</svg>
