name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' '*.js' '*.json' '*.yml' '*.toml' | head -c 80000)
          echo "diff<<DIFF_EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "DIFF_EOF" >> $GITHUB_OUTPUT

      - name: Get PR info
        id: pr_info
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "body<<PR_BODY_EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT
          echo "PR_BODY_EOF" >> $GITHUB_OUTPUT

      - name: Claude Review
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          REVIEW=$(cat <<'PROMPT_EOF' | python3 -c "
          import json, os, sys, urllib.request

          diff = os.environ.get('PR_DIFF', '')[:75000]
          title = os.environ.get('PR_TITLE', '')
          body = os.environ.get('PR_BODY', '')

          prompt = f'''You are a senior staff engineer reviewing a pull request for a Next.js + Prisma + AWS IVS streaming backend.

          PR Title: {title}
          PR Description: {body}

          Review the following diff and provide:
          1. A brief summary of the changes (2-3 sentences)
          2. Any security concerns (auth, injection, secrets exposure)
          3. Any bugs or logic errors
          4. Suggestions for improvement (max 5)
          5. An overall assessment: APPROVE, REQUEST_CHANGES, or COMMENT

          Be concise and actionable. Focus on what matters. Skip trivial style nits.

          Diff:
          {diff}'''

          payload = {
              'model': 'claude-sonnet-4-20250514',
              'max_tokens': 2048,
              'messages': [{'role': 'user', 'content': prompt}]
          }

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=json.dumps(payload).encode(),
              headers={
                  'Content-Type': 'application/json',
                  'x-api-key': os.environ['ANTHROPIC_API_KEY'],
                  'anthropic-version': '2023-06-01',
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  result = json.loads(resp.read())
                  review_text = result['content'][0]['text']
                  # Escape for GitHub Actions output
                  escaped = review_text.replace('%', '%25').replace(chr(10), '%0A').replace(chr(13), '%0D')
                  print(f'review<<REVIEW_EOF')
                  print(review_text)
                  print('REVIEW_EOF')
          except Exception as e:
              print(f'review<<REVIEW_EOF')
              print(f'Claude review failed: {e}')
              print('REVIEW_EOF')
          "
          PROMPT_EOF
          )
          echo "$REVIEW" >> $GITHUB_OUTPUT
        env:
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_TITLE: ${{ steps.pr_info.outputs.title }}
          PR_BODY: ${{ steps.pr_info.outputs.body }}

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.claude.outputs.review }}`;
            if (!review || review.includes('Claude review failed')) {
              console.log('Skipping comment - review failed or empty');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Claude Code Review\n\n${review}\n\n---\n*Automated review by Claude (Anthropic)*`
            });
